[program:rootfs]
command=node /opt/agentbox/rootfs.ts watch
user=root
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:code-server]
command=node /opt/agentbox/code-server.ts
user=user
environment=HOME="/home/user",USER="user",SHELL="/bin/bash",EDITOR="code --wait",VISUAL="code --wait",GIT_EDITOR="code --wait",KUBE_EDITOR="code --wait"
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:gateway]
command=node /opt/agentbox/gateway.ts
user=root
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
