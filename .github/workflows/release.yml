name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      ref:
        description: Ref to publish as a preview
        required: true

permissions:
  contents: write
  packages: write
  security-events: write
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref }}
      - name: Validate release ref
        run: |
          set -euo pipefail
          git fetch origin main --tags
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            tag="${GITHUB_REF_NAME}"
            [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
            test "$(git rev-parse "$tag^{commit}")" = "$(git rev-parse origin/main)"
          fi
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/agentbox
          tags: |
            type=sha,prefix=sha-
            type=semver,pattern={{version}},enable=${{ github.event_name == 'push' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.event_name == 'push' }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}
      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        id: build
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: true
          build-args: |
            AGENTBOX_VERSION=${{ github.ref_name }}
            BUILD_REVISION=${{ github.sha }}
            BUILD_SOURCE=${{ github.server_url }}/${{ github.repository }}
      - uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/agentbox@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL
          exit-code: "1"
      - uses: github/codeql-action/upload-sarif@5e316336eb4f107009e477d4bfbfff13d7250fae
        if: always()
        with:
          sarif_file: trivy-results.sarif
      - uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/agentbox
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        if: github.event_name == 'push'
        with:
          body: |
            Image: `ghcr.io/${{ github.repository_owner }}/agentbox:${{ github.ref_name }}`
            Digest: `${{ steps.build.outputs.digest }}`
