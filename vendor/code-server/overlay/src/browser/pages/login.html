<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Agentbox</title>
		<style>
			body {
				font-family: system-ui, sans-serif;
				margin: 2rem;
			}
			form {
				display: grid;
				gap: 0.75rem;
				max-width: 20rem;
			}
			input,
			button {
				font: inherit;
				padding: 0.5rem;
			}
		</style>
	</head>
	<body>
		<form method="post">
			<h1>Agentbox</h1>
			<input id="base" type="hidden" name="base" value="{{BASE}}" />
			<input id="href" type="hidden" name="href" value="" />
			<input
				name="password"
				type="password"
				autocomplete="current-password"
				autofocus
				required
			/>
			<button type="submit">Login</button>
			{{ERROR}}
		</form>
		<script>
			document.getElementById("href").value = location.href;
		</script>
	</body>
</html>
